services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-taskflow}',
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-taskflow}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
    ports:
      - '${API_PORT:-3001}:3001'
    depends_on:
      db:
        condition: service_healthy

# Web (Next.js) — деплой на Vercel, локально: npm run dev или nx serve web

volumes:
  pgdata:
